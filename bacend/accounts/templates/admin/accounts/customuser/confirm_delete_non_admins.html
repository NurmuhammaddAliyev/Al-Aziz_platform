{% extends "admin/base_site.html" %}

{% block content %}
<div class="content">
    <h1>{{ title }}</h1>
    <p>This will permanently delete all users who are not admins. This action is irreversible.</p>
    <form method="post">{% csrf_token %}
        <button type="submit" class="default">Yes, delete all non-admin users</button>
        <a href="..">Cancel</a>
    </form>
</div>
{% endblock %}
